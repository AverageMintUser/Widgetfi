name: "Build iOS app"

# on: [push]
on: [workflow_dispatch]

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: build archive and ipaify
        run: |
          wget -O archive.zip "https://www.dropbox.com/scl/fi/wy6wodjvyqtbvhxs3qupv/82d7a0a8-686c-11f1-9ef9-d843ae25fd1d.zip?rlkey=2aoyh9pvcszoujsj995d0d3od&dl=1"
          unzip archive.zip -d .

          xcodebuild archive -project Widgetfiforios.xcodeproj -scheme 'Widgetfiforios' -archivePath Widgetfiforios.xcarchive -configuration Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

          mkdir Payload
          mv Widgetfiforios.xcarchive/Products/Applications/Widgetfiforios.app Payload/Widgetfiforios.app

          zip -r "Widgetfiforios.ipa" "Payload"

          mv Widgetfiforios.ipa ${{ runner.temp }}/Widgetfiforios.ipa


      - name: Upload application
        uses: actions/upload-artifact@v4
        with:
          name: Widgetfiforios
          path: ${{ runner.temp }}/Widgetfiforios.ipa
          # you can also archive the entire directory
          # path: ${{ runner.temp }}/build
          retention-days: 3